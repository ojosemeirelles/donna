services:
  - type: web
    name: donna
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: DONNA_STATE_DIR
        value: /data/.donna
      - key: DONNA_WORKSPACE_DIR
        value: /data/workspace
      - key: DONNA_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: donna-data
      mountPath: /data
      sizeGB: 1
